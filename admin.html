<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin - Error 1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
    <style>
      .admin-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }
      .admin-panel {
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: 0.5rem;
        padding: 1.5rem;
      }
      .admin-panel h3 { margin-bottom: 1rem; color: var(--accent-color); font-family: var(--font-mono); }
      .input-group { margin-bottom: 1rem; display: flex; flex-direction: column; }
      .input-group label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; }
      .input-group input, .input-group textarea, .input-group select {
        background: rgba(0,0,0,0.5); border: 1px solid var(--border-color); color: var(--text-main);
        padding: 0.75rem; border-radius: 0.25rem; font-family: var(--font-main);
      }
    </style>
  </head>
  <body>
    <div class="glow glow-1"></div>
    <div class="app-container">
      <nav class="navbar">
        <div class="logo"><a href="/" style="text-decoration:none;"><span class="neon-text">Error 1.0 System Admin</span></a></div>
      </nav>

      <main id="loginView">
        <div class="admin-panel" style="max-width: 400px; margin: 0 auto;">
          <h3>Admin Login</h3>
          <div class="input-group">
             <label>Username</label>
             <input type="text" id="adminUser" />
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="adminPass" />
          </div>
          <button class="btn btn-primary" style="width: 100%;" id="loginBtn">Login</button>
        </div>
      </main>

      <main id="dashboardView" style="display:none;">
        <div class="admin-layout">
           
           <!-- Time Control -->
           <div class="admin-panel">
             <h3>Control Contest Timer</h3>
             <div class="input-group">
               <label>Start Time (ISO String)</label>
               <input type="text" id="timeStart" placeholder="e.0. 2026-06-13T14:00:00+05:30" />
             </div>
             <div class="input-group">
               <label>End Time (ISO String)</label>
               <input type="text" id="timeEnd" placeholder="2026-06-13T16:00:00+05:30" />
             </div>
             <button class="btn btn-secondary" id="updateTimeBtn">Update Timer</button>
           </div>

           <!-- Add Registered User -->
           <div class="admin-panel">
            <h3>Add Allowed Participant</h3>
            <div class="input-group">
              <label>Participant Name</label>
              <input type="text" id="regName" placeholder="John Doe" />
            </div>
            <div class="input-group">
              <label>Participant Email</label>
              <input type="email" id="regEmail" placeholder="john@example.com" />
            </div>
            <button class="btn btn-secondary" id="addUserBtn">Register User</button>
          </div>

          <!-- Add Problem -->
          <div class="admin-panel" style="grid-column: 1 / -1;">
            <h3>Add New Problem</h3>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
               <div class="input-group">
                  <label>Title</label>
                  <input type="text" id="pTitle" />
               </div>
               <div class="input-group">
                  <label>Difficulty</label>
                  <select id="pDiff"><option>Easy</option><option>Medium</option><option>Hard</option></select>
               </div>
            </div>
            <div class="input-group"><label>Description</label><textarea id="pDesc" rows="3"></textarea></div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
              <div class="input-group"><label>Input Format</label><input type="text" id="pIn" /></div>
              <div class="input-group"><label>Output Format</label><input type="text" id="pOut" /></div>
              <div class="input-group"><label>Constraints</label><input type="text" id="pCons" /></div>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                <div class="input-group"><label>Example Input</label><textarea id="pExIn"></textarea></div>
                <div class="input-group"><label>Example Output</label><textarea id="pExOut"></textarea></div>
            </div>
            <div class="input-group">
                <label>Test Cases (JSON Array)</label>
                <textarea id="pTest" rows="2" placeholder='[{"in":"1","out":"2"}]'></textarea>
            </div>
            <button class="btn btn-primary" id="addProbBtn">Publish Problem</button>
          </div>

        </div>
      </main>
    </div>
    <script type="module" src="./admin.js"></script>
  </body>
</html>
