<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Problems - Error 1.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="glow glow-1"></div>
    
    <div class="app-container">
      <nav class="navbar">
        <div class="logo">
          <a href="/" style="text-decoration:none;"><span class="neon-text">Error 1.0</span></a>
        </div>
        <div class="nav-links">
          <a href="/leaderboard.html">Leaderboard</a>
        </div>
      </nav>

      <main style="flex:1;">
        <h1 style="margin-bottom: 2rem;">Contest Problems</h1>
        <div id="problemsList" style="display: flex; flex-direction: column; gap: 1rem;">
            <!-- Rendered by JS -->
            <p>Loading problems...</p>
        </div>
      </main>
    </div>

    <script type="module" src="./problems.js"></script>
    <style>
      .problem-card {
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: 0.5rem;
        padding: 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: transform 0.2s, box-shadow 0.2s;
        text-decoration: none;
        color: var(--text-main);
      }
      .problem-card:hover {
        transform: translateY(-2px);
        box-shadow: var(--accent-glow);
        border-color: var(--accent-color);
      }
      .difficulty {
        padding: 0.25rem 0.5rem;
        border-radius: 0.25rem;
        font-size: 0.8rem;
        font-weight: 600;
        text-transform: uppercase;
      }
      .diff-easy { color: #00ffcc; background: rgba(0, 255, 204, 0.1); }
      .diff-medium { color: #ffcc00; background: rgba(255, 204, 0, 0.1); }
      .diff-hard { color: #ff3366; background: rgba(255, 51, 102, 0.1); }
    </style>
  </body>
</html>
